---

- name: Install containerd
  ansible.builtin.apt:
    name: containerd
    state: latest
    update_cache: true

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Enable SystemdCgroup in containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*SystemdCgroup\s*='
    line: '            SystemdCgroup = true'
    insertafter: '\[plugins\."io\.containerd\.grpc\.v1\.cri"\.containerd\.runtimes\.runc\.options\]'
  notify: Kubernetes | Restart containerd

- name: Get kubeadm expected pause image
  ansible.builtin.command: kubeadm config images list
  register: __kubernetes_kubeadm_images
  changed_when: false

- name: Set sandbox image fact
  ansible.builtin.set_fact:
    __kubernetes_pause_image: "{{ __kubernetes_kubeadm_images.stdout_lines | select('match', '.*pause.*') | first }}"

- name: Set correct sandbox image for kubeadm compatibility
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*sandbox_image\s*='
    line: '    sandbox_image = "{{ __kubernetes_pause_image }}"'
  notify: Kubernetes | Restart containerd

- name: Ensure containerd is enabled and started
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
